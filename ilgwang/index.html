<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>일광오피스 — 파비콘 · OG 이미지 10종 미리보기</title>
<style>
  :root { --ink:#222; --line:#e3e3e3; --soft:#f6f6f8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
         color:var(--ink); background:#fff; line-height:1.6; }
  header { padding:48px 24px 8px; max-width:1080px; margin:0 auto; }
  h1 { font-size:1.7rem; margin:0 0 6px; }
  header p { color:#666; margin:0; }
  main { max-width:1080px; margin:0 auto; padding:24px; display:grid; gap:32px; }
  section.card { border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .og { display:block; width:100%; height:auto; }
  .meta { display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:16px 20px; background:var(--soft); }
  .meta img.icon { width:64px; height:64px; border-radius:14px; }
  .meta .t { flex:1; min-width:200px; }
  .meta .t b { font-size:1.05rem; }
  .meta .t span { display:block; color:#777; font-size:.85rem; }
  .files { display:flex; gap:10px; flex-wrap:wrap; }
  .files a { font-size:.8rem; color:#3273dc; text-decoration:none; border:1px solid var(--line);
             background:#fff; border-radius:999px; padding:4px 12px; }
  details { border-top:1px solid var(--line); }
  summary { cursor:pointer; padding:10px 20px; font-size:.85rem; color:#555; }
  pre { margin:0; padding:14px 20px 20px; overflow-x:auto; font-size:.78rem; background:#fafafa; }
</style>
</head>
<body>
<header>
  <h1>일광오피스 파비콘 · OG 이미지 — 10개 랜딩 사이트용</h1>
  <p>사이트별 폴더(site01–site10)의 4개 파일을 각 랜딩 사이트 루트에 복사한 뒤, 아래 코드 스니펫을 &lt;head&gt;에 넣으세요. og:image는 반드시 <b>해당 사이트의 절대 URL</b>로 바꿔야 합니다.</p>
</header>
<main id="list"></main>
<script>
const SITES = [
  ["site01","선라이즈 Sunrise","오렌지 그라데이션 · 지평선 위 떠오르는 해"],
  ["site02","미드나잇 골드 Midnight Gold","네이비 · 골드 빌딩과 해"],
  ["site03","민트 버스트 Mint Burst","민트 · 선버스트 광선"],
  ["site04","바이올렛 윈도우 Violet Window","보라 · 창문과 햇살 한 칸"],
  ["site05","에메랄드 시티 Emerald City","그린 · 성장 스카이라인과 해"],
  ["site06","코랄 서클 Coral Circle","코랄 · 타이포 '일' 서클"],
  ["site07","스카이 Sky","하늘색 · 해와 구름"],
  ["site08","앰버 나이트 Amber Night","차콜 다크 · 앰버 글로우"],
  ["site09","던 로즈 Dawn Rose","로즈 그라데이션 · 여명 아치"],
  ["site10","인디고 테크 Indigo Tech","인디고 · 육각 코어와 시안 포인트"],
];
const snippet = id => `<!-- 파비콘 -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-96.png" type="image/png" sizes="96x96">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">

<!-- Open Graph (og:image URL은 해당 사이트 도메인으로 교체) -->
<meta property="og:image" content="https://YOUR-DOMAIN/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="일광오피스">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://YOUR-DOMAIN/og-image.png">`;
document.getElementById('list').innerHTML = SITES.map(([id,name,desc],i)=>`
<section class="card">
  <img class="og" src="${id}/og-image.png" alt="${name} OG 이미지" loading="lazy">
  <div class="meta">
    <img class="icon" src="${id}/apple-touch-icon.png" alt="${name} 아이콘">
    <div class="t"><b>${String(i+1).padStart(2,'0')} · ${name}</b><span>${desc}</span></div>
    <div class="files">
      <a href="${id}/favicon.svg">favicon.svg</a>
      <a href="${id}/favicon-96.png">favicon-96.png</a>
      <a href="${id}/apple-touch-icon.png">apple-touch-icon.png</a>
      <a href="${id}/og-image.png">og-image.png</a>
    </div>
  </div>
  <details><summary>&lt;head&gt; 코드 스니펫 보기</summary><pre>${snippet(id).replace(/</g,'&lt;')}</pre></details>
</section>`).join('');
</script>
</body>
</html>
